name: Clear Commits

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type CLEAR_MAIN to rewrite main history'
        required: true
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: main
      - name: Configure Git
        shell: bash
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "CLEAR_MAIN" ]; then
            echo "Confirmation missing/invalid; aborting."
            exit 1
          fi
          if [ "${{ github.actor }}" != "Amnesiash" ]; then
            echo "Only Amnesiash can run this workflow; aborting."
            exit 1
          fi
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git checkout --orphan clearhistory
          git branch -D main
          git checkout --orphan main
          git add .
          git commit -m "ㅤ"
          git push -f -u origin main
      - name: Cleanup Workflow
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 0
