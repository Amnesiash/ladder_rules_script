name: Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  schedule:
    - cron: "5 0,12 * * *"

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Shanghai'
      SING_BOX_VERSION: 1.10.5
    
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4.1.0
        with:
          path: ladder-repo
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Generate Clash / Loon / QuantumultX / Shadowrocket rules
        run: |
          cd ladder-repo
          bun run generate:clients

      - name: Push rule updates to main
        run: |
          cd ladder-repo
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"
          # 仅在生成结果有变化时更新 main
          if [[ -n $(git status -s) ]]; then
            git add -A
            git commit -m "Auto Update $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          else
            echo "No rule changes to push to main."
          fi

      - name: Check for rule changes
        id: check-changes
        run: |
          cd ladder-repo
          # 对比上次提交，检查 Rules 目录是否有变化
          if [[ -n $(git diff HEAD~1 HEAD --name-only -- Rules/) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            # 按客户端分类
            CLASH_DATA=""
            LOON_DATA=""
            QX_DATA=""
            SR_DATA=""
            
            while IFS= read -r file; do
              status=$(git diff HEAD~1 HEAD --diff-filter=ADM --name-status -- "$file" | awk '{print $1}')
              bname=$(basename "$file")
              
              # 计算行数变化
              if [[ "$status" == "A" ]]; then
                lines=$(git show HEAD:"$file" 2>/dev/null | wc -l | tr -d ' ')
                stats="(+${lines})"
              elif [[ "$status" == "M" ]]; then
                added=$(git diff HEAD~1 HEAD --unified=0 -- "$file" 2>/dev/null | grep '^+' | grep -v '^+++' | wc -l)
                deleted=$(git diff HEAD~1 HEAD --unified=0 -- "$file" 2>/dev/null | grep '^-' | grep -v '^---' | wc -l)
                stats="(+${added}/-${deleted})"
              elif [[ "$status" == "D" ]]; then
                stats=""
              fi
              
              # 按客户端分类
              if [[ "$file" == Rules/Clash/* ]]; then
                CLASH_DATA="${CLASH_DATA}${bname}|${status}|${stats}\n"
              elif [[ "$file" == Rules/Loon/* ]]; then
                LOON_DATA="${LOON_DATA}${bname}|${status}|${stats}\n"
              elif [[ "$file" == Rules/QuantumultX/* ]]; then
                QX_DATA="${QX_DATA}${bname}|${status}|${stats}\n"
              elif [[ "$file" == Rules/Shadowrocket/* ]]; then
                SR_DATA="${SR_DATA}${bname}|${status}|${stats}\n"
              fi
            done < <(git diff HEAD~1 HEAD --name-only -- Rules/)
            
            # 输出分类结果
            echo "clash_data<<EOF" >> $GITHUB_OUTPUT
            echo -e "$CLASH_DATA" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            echo "loon_data<<EOF" >> $GITHUB_OUTPUT
            echo -e "$LOON_DATA" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            echo "qx_data<<EOF" >> $GITHUB_OUTPUT
            echo -e "$QX_DATA" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            echo "sr_data<<EOF" >> $GITHUB_OUTPUT
            echo -e "$SR_DATA" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            # 统计新增/更新/删除文件数量
            added_count=$(git diff HEAD~1 HEAD --diff-filter=A --name-only -- Rules/ | wc -l | tr -d ' ')
            modified_count=$(git diff HEAD~1 HEAD --diff-filter=M --name-only -- Rules/ | wc -l | tr -d ' ')
            deleted_count=$(git diff HEAD~1 HEAD --diff-filter=D --name-only -- Rules/ | wc -l | tr -d ' ')
            echo "added_count=$added_count" >> $GITHUB_OUTPUT
            echo "modified_count=$modified_count" >> $GITHUB_OUTPUT
            echo "deleted_count=$deleted_count" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -z "$TG_BOT_TOKEN" || -z "$TG_CHAT_ID" ]]; then
            echo "Telegram secrets not configured, skipping notification."
            exit 0
          fi

          CLASH="${{ steps.check-changes.outputs.clash_data }}"
          LOON="${{ steps.check-changes.outputs.loon_data }}"
          QX="${{ steps.check-changes.outputs.qx_data }}"
          SR="${{ steps.check-changes.outputs.sr_data }}"
          ADDED="${{ steps.check-changes.outputs.added_count }}"
          MODIFIED="${{ steps.check-changes.outputs.modified_count }}"
          DELETED="${{ steps.check-changes.outputs.deleted_count }}"
          TREE_URL="https://github.com/${{ github.repository }}/blob/main"
          
          # 构建文件列表
          build_list() {
            local input="$1"
            local client_path="$2"
            local result=""
            
            if [[ -n "$input" ]]; then
              while IFS= read -r line; do
                if [[ -n "$line" ]]; then
                  IFS='|' read -r filename status stats <<< "$line"
                  
                  local emoji=""
                  [[ "$status" == "A" ]] && emoji="🟢"
                  [[ "$status" == "M" ]] && emoji="🟡"
                  [[ "$status" == "D" ]] && emoji="🔴"
                  
                  if [[ "$status" == "D" ]]; then
                    result="${result}${emoji} ${filename}\n"
                  else
                    result="${result}${emoji} [${filename}](${TREE_URL}/${client_path}/${filename}) ${stats}\n"
                  fi
                fi
              done <<< "$input"
            fi
            echo -e "$result"
          }
          
          # 构建统计摘要
          SUMMARY=""
          [[ "$ADDED" -gt "0" ]] && SUMMARY="${SUMMARY}🟢 新增 **${ADDED}**"
          [[ "$MODIFIED" -gt "0" ]] && { [[ -n "$SUMMARY" ]] && SUMMARY="${SUMMARY} / "; SUMMARY="${SUMMARY}🟡 更新 **${MODIFIED}**"; }
          [[ "$DELETED" -gt "0" ]] && { [[ -n "$SUMMARY" ]] && SUMMARY="${SUMMARY} / "; SUMMARY="${SUMMARY}🔴 删除 **${DELETED}**"; }
          
          MESSAGE="*📢 rule provider 产物变化*"
          MESSAGE="${MESSAGE}"$'\n'
          MESSAGE="${MESSAGE}"$'\n'"━━━━━━━━━━━━━━━━━━"
          MESSAGE="${MESSAGE}"$'\n'"${SUMMARY}"
          MESSAGE="${MESSAGE}"$'\n'"━━━━━━━━━━━━━━━━━━"
          MESSAGE="${MESSAGE}"$'\n'
          
          [[ -n "$CLASH" ]] && MESSAGE="${MESSAGE}*Clash*"$'\n'"$(build_list "$CLASH" "Rules/Clash")"$'\n'
          [[ -n "$LOON" ]] && MESSAGE="${MESSAGE}*Loon*"$'\n'"$(build_list "$LOON" "Rules/Loon")"$'\n'
          [[ -n "$QX" ]] && MESSAGE="${MESSAGE}*QuantumultX*"$'\n'"$(build_list "$QX" "Rules/QuantumultX")"$'\n'
          [[ -n "$SR" ]] && MESSAGE="${MESSAGE}*Shadowrocket*"$'\n'"$(build_list "$SR" "Rules/Shadowrocket")"$'\n'

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            -d "text=${MESSAGE}" \
            -d "disable_web_page_preview=true"

      - name: Prepare ladder release artifacts
        run: |
          cd ladder-repo
          bun run build:release:clean

      - name: Push Update
        run: |
          cd ladder-repo
          # release 分支用于发布产物，允许覆盖式更新
          git fetch origin release || true
          git checkout -B release
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git reset --hard origin/release
          fi

          # 仅发布 .release/ 目录中的产物到 release 分支根目录
          if [[ ! -d ".release" ]]; then
            echo "Missing .release/ artifacts directory; aborting."
            exit 1
          fi
          # 清空工作区（保留 .git），避免把主仓库源文件提交到 release 分支
          find . -mindepth 1 -maxdepth 1 ! -name ".git" ! -name ".release" -exec rm -rf {} +
          cp -a .release/. .
          rm -rf .release

          if [[ -n $(git status -s) ]]; then
            git config --local user.email "${{ github.actor }}@users.noreply.github.com"
            git config --local user.name "${{ github.actor }}"
            git add -A
            git commit -m "Auto Update $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git push --force-with-lease origin release
          else
            echo "No changes to commit."
          fi

      - name: Cleanup Workflow
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2
