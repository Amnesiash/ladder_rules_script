name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "5 0,12 * * *"

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Shanghai'
      SING_BOX_VERSION: 1.10.5
    
    steps: 
    - name: Checkout target repository
      uses: actions/checkout@v4.1.0
      with:
        repository: Amnesiash/ladder_rules_script
        path: ladder-repo

    - name: Checkout rule repository (release)
      uses: actions/checkout@v4.1.0
      with:
        repository: Amnesiash/rule
        ref: release
        path: rule-repo

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.13

    - name: Sync Clash rules from rule release branch artifacts
      run: |
        cd ladder-repo
        bun run sync:clash -- --rule-repo ../rule-repo --ladder-repo .

    - name: Copy files
      run: |
        # 仅输出当前已同步的 Clash 规则
        echo "Clash:"
        find ladder-repo/Rules/Clash -type f | head -n 50 || true

    - name: Generate Loon / QuantumultX / Shadowrocket rules
      run: |
        cd ladder-repo
        bun run generate:clients

    - name: Prepare ladder release artifacts
      run: |
        cd ladder-repo
        bun run build:release:clean

    - name: Push Update
      run: |
        cd ladder-repo
        git checkout -B release
        if [[ -n $(git status -s) ]]; then
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"
          git add -A
          git commit -m "Auto Update $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          git push origin release
        else
          echo "No changes to commit."
        fi

    - name: Cleanup Workflow
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2
