name: Build

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "5 0,12 * * *"

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Shanghai'
      SING_BOX_VERSION: 1.10.5
    
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4.1.0
        with:
          path: ladder-repo
          fetch-depth: 0

      - name: Checkout rule repository (release)
        uses: actions/checkout@v4.1.0
        with:
          repository: Amnesiash/rule
          ref: release
          path: rule-repo
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Sync Clash rules from rule release branch artifacts
        run: |
          cd ladder-repo
          bun run sync:clash -- --rule-repo ../rule-repo --ladder-repo .

      - name: Copy files
        run: |
          # 仅输出当前已同步的 Clash 规则
          echo "Clash:"
          find ladder-repo/Rules/Clash -type f | head -n 50 || true

      - name: Generate Loon / QuantumultX / Shadowrocket rules
        run: |
          cd ladder-repo
          bun run generate:clients

      - name: Prepare ladder release artifacts
        run: |
          cd ladder-repo
          bun run build:release:clean

      - name: Push Update
        run: |
          cd ladder-repo
          # release 分支用于发布产物，允许覆盖式更新
          git fetch origin release || true
          git checkout -B release
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git reset --hard origin/release
          fi

          # 仅发布 .release/ 目录中的产物到 release 分支根目录
          if [[ ! -d ".release" ]]; then
            echo "Missing .release/ artifacts directory; aborting."
            exit 1
          fi
          # 清空工作区（保留 .git），避免把主仓库源文件提交到 release 分支
          find . -mindepth 1 -maxdepth 1 ! -name ".git" ! -name ".release" -exec rm -rf {} +
          cp -a .release/. .
          rm -rf .release

          if [[ -n $(git status -s) ]]; then
            git config --local user.email "${{ github.actor }}@users.noreply.github.com"
            git config --local user.name "${{ github.actor }}"
            git add -A
            git commit -m "Auto Update $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git push --force-with-lease origin release
          else
            echo "No changes to commit."
          fi

      - name: Cleanup Workflow
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2
