name: Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  schedule:
    - cron: "5 0,12 * * *"

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Shanghai'
      SING_BOX_VERSION: 1.10.5
    
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v6.0.2
        with:
          path: ladder-repo
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Build release artifacts
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd ladder-repo
          bun run build:release:clean

      - name: Push Update
        run: |
          cd ladder-repo
          if [[ ! -d ".release" ]]; then
            echo "Missing .release/ artifacts directory; aborting."
            exit 1
          fi

          release_worktree="../ladder-release"
          rm -rf "$release_worktree"
          git fetch origin release || true
          git worktree add -B release "$release_worktree" origin/release

          cd "$release_worktree"
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -a ../ladder-repo/.release/. .

          if [[ -n $(git status -s) ]]; then
            git config --local user.email "${{ github.actor }}@users.noreply.github.com"
            git config --local user.name "${{ github.actor }}"
            git add -A
            git commit -m "Auto Update Release $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git push --force-with-lease origin release
          else
            echo "No release changes to commit."
          fi

      - name: Cleanup Workflow
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2
