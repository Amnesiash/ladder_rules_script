name: Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  schedule:
    - cron: "5 0,12 * * *"

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Shanghai'
      SING_BOX_VERSION: 1.10.5
    
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4.1.0
        with:
          path: ladder-repo
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Generate Clash / Loon / QuantumultX / Shadowrocket rules
        run: |
          cd ladder-repo
          bun run generate:clients

      - name: Push rule updates to main
        run: |
          cd ladder-repo
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"
          # 仅在生成结果有变化时更新 main
          if [[ -n $(git status -s) ]]; then
            git add -A
            git commit -m "Auto Update $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          else
            echo "No rule changes to push to main."
          fi

      - name: Check and notify rule changes via Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd ladder-repo
          bash build_scripts/telegram-notify.sh .

      - name: Prepare ladder release artifacts
        run: |
          cd ladder-repo
          bun run build:release:clean

      - name: Push Update
        run: |
          cd ladder-repo
          # release 分支用于发布产物，允许覆盖式更新
          git fetch origin release || true
          git checkout -B release
          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git reset --hard origin/release
          fi

          # 仅发布 .release/ 目录中的产物到 release 分支根目录
          if [[ ! -d ".release" ]]; then
            echo "Missing .release/ artifacts directory; aborting."
            exit 1
          fi
          # 清空工作区（保留 .git），避免把主仓库源文件提交到 release 分支
          find . -mindepth 1 -maxdepth 1 ! -name ".git" ! -name ".release" -exec rm -rf {} +
          cp -a .release/. .
          rm -rf .release

          if [[ -n $(git status -s) ]]; then
            git config --local user.email "${{ github.actor }}@users.noreply.github.com"
            git config --local user.name "${{ github.actor }}"
            git add -A
            git commit -m "Auto Update $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git push --force-with-lease origin release
          else
            echo "No changes to commit."
          fi

      - name: Cleanup Workflow
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2
