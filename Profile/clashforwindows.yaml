#==========================================
# @ConfigName        常用配置
# @ClashDownload     https://github.com/Fndroid/clash_for_windows_pkg/releases
# @Thanks            @blackmatrix7, @Fndroid, @Anti
# @Attention         𝐏𝐥𝐞𝐚𝐬𝐞 𝐮𝐬𝐞 𝐭𝐡𝐞 𝐥𝐚𝐭𝐞𝐬𝐭 𝐯𝐞𝐫𝐬𝐢𝐨𝐧 𝐨𝐟 𝐂𝐥𝐚𝐬𝐡𝐟𝐨𝐫𝐖𝐢𝐧𝐝𝐨𝐰𝐬
#==========================================# 
mixed-port: 7890     # 混合端口
port: 7891           # HTTP 代理端口
socks-port: 7892     # Socks 端口
redir-port: 7893     # Redir 端口
allow-lan: true      # 允许局域网连接
bind-address: '*'    # 地址绑定
mode: rule           # 规则模式
log-level: info      # 日志级别
ipv6: false          # IPV6开关
external-controller:   127.0.0.1:9090

dns:
  enable: true       # 不使用系统 DNS
  ipv6: false        # 关闭 IPV6
  listen: 0.0.0.0:53 # dns 监听
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.xboxlive.com
    - msftconnecttest.com
    - xbox.*.microsoft.com
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
  nameserver:        # 默认 DNS 服务
    - 223.5.5.5
    - 119.29.29.29
  fallback:          # 国外 DNS 服务器
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.alidns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

#========= 建立锚点 =========#
# 策略组引用
pr:   &a3 {type: select， proxies: [🚀 手动切换， 🇭🇰 香港节点， 🇯🇵 日本节点， 🇺🇲 美国节点， 🇨🇳 台湾节点， 🇸🇬 狮城节点， 🇰🇷 韩国节点， DIRECT] }
# 策略组引用
pr2:   &a3-2 {type: select， proxies: [订阅-1，订阅-2] }
# 订阅更新
p:    &a1 {type: http， interval: 86400， health-check: {enable: true， url: http://www.gstatic.com/generate_204， interval: 1800} }
# 自动选择
auto: &a4 {type: url-test， lazy: true， url: http://www.gstatic.com/generate_204， interval: 900， use: [订阅-1，订阅-2]}
# 手动选择
use:  &a2 {type: select， use: [订阅-1，订阅-2] }
# classical 规则
c:    &a6 {type: http， behavior: classical， interval: 86400}
# domain 规则
d:    &a5 {type: http， behavior: domain， interval: 86400}
# ipcidr 规则
i:    &a7 {type: http， behavior: ipcidr， interval: 86400}


proxy-providers:
  订阅-1:
    <<: *a1
    url: 
    path: ./proxy/订阅-1.yaml
    # URL后面填写格式1: 直接填写你的机场Clash订阅[单一订阅][推荐此种方式，避免订阅泄露]
    # URL后面填写格式2：https://sub.xeton.dev/sub?target=clash&url=请手动填入你的订阅[多机场订阅用|分割即可]&list=true&udp=false  

  订阅-2:
    <<: *a1
    url: 
    path: ./proxy/订阅-2.yaml


proxies: null

proxy-groups:
#分流分组
  - {name: 🚀 手动切换， <<: *a3-2}
  - {name: ☁️ ETON， type: select， use: [ETON] }
  - {name: ☁️ 一点点收藏櫃， type: select， use: [一点点收藏櫃] }
  - {name: 🌏 全球加速， <<: *a3}
  - {name: 🎨 Figma，  <<: *a3}
  - {name: 🍎 苹果服务， <<: *a3}
  - {name: 📺 哔哩哔哩， type: select， proxies: [DIRECT， 🇭🇰 香港节点， 🇨🇳 台湾节点]}
  - {name: 🤖 OpenAi，  <<: *a2}
  - {name: 🌌 谷歌服务， <<: *a3}
  - {name: 🕹️ 游戏平台， <<: *a3}
  - {name: 🎮 Game，   <<: *a2， filter: "Game|游戏"}
  - {name: 🆎 AdBlock， type: select， proxies: [REJECT]}
  - {name: 🗑️ 兜底分流， <<: *a3}

#节点分组
  - {name: 🇭🇰 香港节点， <<: *a4， filter: "港|HK|(?i)Hong"}
  - {name: 🇯🇵 日本节点， <<:  *a4， filter: "日|东京|JP|(?i)Japan"}
  - {name: 🇨🇳 台湾节点， <<: *a4， filter: "台|湾|TW|(?i)Taiwan"}
  - {name: 🇺🇲 美国节点， <<: *a4， filter: "美|US|(?i)States|American"}
  - {name: 🇸🇬 狮城节点， <<: *a4， filter: "新|坡|SG|(?i)Singapore"}
  - {name: 🇰🇷 韩国节点， <<: *a4， filter: "韩|韩国|KR|(?i)Korea"}


