# Mihomo 配置
# 日期：2026-05-11
# 配置作者：https://github.com/Amnesiash
# 适用版本：所有使用 Clash Meta 核心的程序


# ==================== 锚点配置 ====================
# 策略组类型模板 - 定义不同的策略组基础配置
BaseUrltest: &BaseUrltest {type: url-test, interval: 300, tolerance: 50, timeout: 3000, max-failed-times: 3, lazy: true, url: 'https://cp.cloudflare.com/generate_204', hidden: true} 

# 节点筛选正则表达式 - 基于地理位置和关键词过滤
FilterHK: &FilterHK '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(排除1|排除2|5x)).*$'
FilterSG: &FilterSG '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(排除1|排除2|5x)).*$'
FilterJP: &FilterJP '^(?=.*(?i)(日本|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(排除1|排除2|5x)).*$'
FilterKR: &FilterKR '^(?=.*(?i)(韩|🇰🇷|韓|首尔|南朝鲜|KR|KOR|Korea|South))(?!.*(排除1|排除2|5x)).*$'
FilterUS: &FilterUS '^(?=.*(?i)(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(排除1|排除2|5x)).*$'
FilterTW: &FilterTW '^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH))(?!.*(排除1|排除2|5x)).*$'
FilterEU: &FilterEU '^(?=.*(?i)(奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU))(?!.*(排除1|排除2|5x)).*$'

# 策略组
proxy-groups:
  # 应用策略层 - Select手动选择，支持多场景应用优化，使用时默认，也可修改
  - {name: 手动选择, type: select, include-all: true, icon: https://github.com/Amnesiash/ladder_rules_script/raw/main/Gallery/vpnlogo/Meta.png}
  - {name: 全球加速, type: select, proxies: [自动选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点, 欧洲节点, 手动选择], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Global.png}
  - {name: AI, type: select, proxies: [狮城节点, 日本节点, 美国节点, 欧洲节点, 手动选择], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/AI.png}
  - {name: Figma, type: select, proxies: [DIRECT, 自动选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点, 欧洲节点, 手动选择], icon: https://github.com/Amnesiash/ladder_rules_script/raw/main/Gallery/Color/Figma.png}
  - {name: Telegram, type: select, proxies: [自动选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点, 欧洲节点, 手动选择], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Telegram_X.png}
  - {name: 哔哩哔哩, type: select, proxies: [DIRECT, 香港节点, 台湾节点, 手动选择], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/bilibili_3.png}
  - {name: 国际媒体, type: select, proxies: [自动选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点, 欧洲节点, 手动选择], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Streaming!CN.png}
  - {name: 苹果服务, type: select, proxies: [DIRECT, 自动选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点, 欧洲节点, 手动选择], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Apple.png}
  - {name: 漏网之鱼, type: select, proxies: [DIRECT, 自动选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 韩国节点, 美国节点, 欧洲节点, 手动选择], icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Final.png}

  # 地理策略层 - 自动测速节点选择
  - {name: 自动选择, <<: *BaseUrltest, include-all: true, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png}
  - {name: 香港节点, <<: *BaseUrltest, include-all: true, filter: *FilterHK, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Hong_Kong.png}
  - {name: 台湾节点, <<: *BaseUrltest, include-all: true, filter: *FilterTW, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Taiwan.png}
  - {name: 日本节点, <<: *BaseUrltest, include-all: true, filter: *FilterJP, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Japan.png}
  - {name: 狮城节点, <<: *BaseUrltest, include-all: true, filter: *FilterSG, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Singapore.png}
  - {name: 韩国节点, <<: *BaseUrltest, include-all: true, filter: *FilterKR, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Korea.png}
  - {name: 美国节点, <<: *BaseUrltest, include-all: true, filter: *FilterUS, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/United_States.png}
  - {name: 欧洲节点, <<: *BaseUrltest, include-all: true, filter: *FilterEU, icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/European_Union.png}

# ==================== 规则集 ====================
# 规则集行为模板
d: &RuleSet_d {type: http, behavior: domain, format: mrs, interval: 86400}
i: &RuleSet_i {type: http, behavior: ipcidr, format: mrs, interval: 86400}

# 规则提供者
rule-providers:
  # Domain 规则提供者
  Direct_Domain:         {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Direct/Direct_Domain.mrs, path: ./ruleset/Direct/Direct_Domain.mrs}
  WeChat_Domain:         {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/WeChat/WeChat_Domain.mrs, path: ./ruleset/WeChat/WeChat_Domain.mrs}
  SteamCN_Domain:        {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/SteamCN/SteamCN_Domain.mrs, path: ./ruleset/SteamCN/SteamCN_Domain.mrs}
  Private_Domain:        {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Private/Private_Domain.mrs, path: ./ruleset/Private/Private_Domain.mrs}
  AI_Domain:             {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/AI/AI_Domain.mrs, path: ./ruleset/AI/AI_Domain.mrs}
  Apple_Domain:          {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Apple/Apple_Domain.mrs, path: ./ruleset/Apple/Apple_Domain.mrs}
  Telegram_Domain:       {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Telegram/Telegram_Domain.mrs, path: ./ruleset/Telegram/Telegram_Domain.mrs}
  StreamingHMT_Domain:   {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/StreamingHMT/StreamingHMT_Domain.mrs, path: ./ruleset/StreamingHMT/StreamingHMT_Domain.mrs}
  Streaming_Domain:      {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Streaming/Streaming_Domain.mrs, path: ./ruleset/Streaming/Streaming_Domain.mrs}
  Proxy_Domain:          {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Proxy/Proxy_Domain.mrs, path: ./ruleset/Proxy/Proxy_Domain.mrs}
  China_Domain:          {<<: *RuleSet_d, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/China/China_Domain.mrs, path: ./ruleset/China/China_Domain.mrs}

  # IP 规则提供者
  WeChat_IP:             {<<: *RuleSet_i, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/WeChat/WeChat_IP.mrs, path: ./ruleset/WeChat/WeChat_IP.mrs}
  Private_IP:            {<<: *RuleSet_i, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Private/Private_IP.mrs, path: ./ruleset/Private/Private_IP.mrs}
  AI_IP:                 {<<: *RuleSet_i, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/AI/AI_IP.mrs, path: ./ruleset/AI/AI_IP.mrs}
  Apple_IP:              {<<: *RuleSet_i, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Apple/Apple_IP.mrs, path: ./ruleset/Apple/Apple_IP.mrs}
  Telegram_IP:           {<<: *RuleSet_i, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Telegram/Telegram_IP.mrs, path: ./ruleset/Telegram/Telegram_IP.mrs}
  StreamingHMT_IP:       {<<: *RuleSet_i, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/StreamingHMT/StreamingHMT_IP.mrs, path: ./ruleset/StreamingHMT/StreamingHMT_IP.mrs}
  Streaming_IP:          {<<: *RuleSet_i, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Streaming/Streaming_IP.mrs, path: ./ruleset/Streaming/Streaming_IP.mrs}
  Proxy_IP:              {<<: *RuleSet_i, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/Proxy/Proxy_IP.mrs, path: ./ruleset/Proxy/Proxy_IP.mrs}
  China_IP:              {<<: *RuleSet_i, url: https://github.com/Amnesiash/ladder_rules_script/raw/release/Clash/China/China_IP.mrs, path: ./ruleset/China/China_IP.mrs}

# ==================== 规则路由 ====================
rules: 
  # > 域名规则
  - DOMAIN-SUFFIX, figma.com, Figma
  - RULE-SET, Private_Domain, DIRECT
  - RULE-SET, Direct_Domain, DIRECT
  - RULE-SET, WeChat_Domain, DIRECT
  - RULE-SET, SteamCN_Domain, DIRECT
  - RULE-SET, AI_Domain, AI
  - RULE-SET, Apple_Domain, 苹果服务
  - RULE-SET, Telegram_Domain, Telegram
  - RULE-SET, StreamingHMT_Domain, 哔哩哔哩
  - RULE-SET, Streaming_Domain, 国际媒体
  - RULE-SET, Proxy_Domain, 全球加速
  - RULE-SET, China_Domain, DIRECT

  # > IP 规则
  - RULE-SET, Private_IP, DIRECT, no-resolve
  - RULE-SET, WeChat_IP, DIRECT
  - RULE-SET, AI_IP, AI, no-resolve
  - RULE-SET, Apple_IP, 苹果服务, no-resolve
  - RULE-SET, Telegram_IP, Telegram, no-resolve
  - RULE-SET, StreamingHMT_IP, 哔哩哔哩, no-resolve
  - RULE-SET, Streaming_IP, 国际媒体, no-resolve
  - RULE-SET, Proxy_IP, 全球加速, no-resolve
  - RULE-SET, China_IP, DIRECT
  - GEOIP, CN, DIRECT

  # 兜底规则
  - MATCH, 漏网之鱼

